<html lang="id">

<title>History Harian - Catetan Duit</title>
<style>
        html { background-color: #00a2e9; }
        body { 
            background-color: white; 
            margin: 0 auto; 
            max-width: 500px; 
            min-height: 100vh; 
            box-shadow: 0 0 20px rgba(0,0,0,0.2); 
            padding: 15px;
            font-family: sans-serif;
        }
        .btn-sync {
            background: #27ae60; color: white; border: none; padding: 10px; 
            border-radius: 8px; width: 100%; margin-bottom: 20px; cursor: pointer; font-weight: bold;
        }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f2f2f2; padding: 10px; text-align: left; font-size: 12px; }
        td { padding: 10px; border-bottom: 1px solid #eee; font-size: 13px; }
        .text-masuk { color: #27ae60; font-weight: bold; }
        .text-keluar { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>

    <h2 style="text-align: center; color: #2c3e50;">
        <i class="fas fa-history" style="color: #f39c12;"></i> History Arsip
    </h2>

    <button class="btn-sync" onclick="tokenClient.requestAccessToken()" style="dispaly:none;">
        <i class="fa fa-cloud-download-alt"></i> Sinkronisasi dari Drive
    </button>
<div style="text-align: right; margin-bottom: 15px;">
    <button class="btn-sync" onclick="tarikHistoryDrive()">
    <i class="fa fa-sync-alt"></i> Sinkron Data Terbaru
</button>
</div>
    <div id="wadahHistory">
        <p style="text-align:center; color:#999;">Klik Sinkronisasi untuk melihat data.</p>
    </div>
<div id="modalNotif" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; align-items: center; justify-content: center;">
    <div style="border: 1px solid #444; width: 85%; max-width: 300px; padding: 25px; background: #000000; border-radius: 15px; text-align: center; color: white;">
        <div id="isiNotif" style="margin-bottom: 20px; font-size: 0.95rem; line-height: 1.5;"></div>
        <button onclick="tutupModal()" style="background: white; color: black; border: none; padding: 10px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%;">Oke Sip!</button>
    </div>
</div>
    <script src="https://accounts.google.com/gsi/client" onload="initClient()" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>

    <script>
// --- 1. KONFIGURASI GOOGLE DRIVE ---
const CLIENT_ID = '561366474384-9hf22uio84jrj7adafut9r2h15c2ninf.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/drive.file';
let tokenClient;
let accessToken = null;

function initClient() {
    tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID, 
        scope: SCOPES,
        callback: (res) => { 
            accessToken = res.access_token; 
            tarikHistoryDrive(); 
        }
    });
}

// --- 2. FUNGSI AMBIL DATA DARI DRIVE ---
async function tarikHistoryDrive() {
    // 1. CEK: Apakah kita sudah punya akses (Token)?
    if (!accessToken) {
        // Kalau belum ada kunci, panggil Google buat minta izin
        // Setelah user pilih akun, fungsi callback (initClient) akan jalan
        // Tips: Pastikan di callback initClient Abang memanggil tarikHistoryDrive() lagi
        tokenClient.requestAccessToken();
        return; // Berhenti dulu di sini, nanti lanjut lagi setelah dapat token
    }

    const wadah = document.getElementById('wadahHistory');
    
    // Tampilan Loading
    wadah.innerHTML = `
        <div style="text-align:center; padding:40px; color:#7f8c8d;">
            <i class="fa fa-sync-alt fa-spin" style="font-size:2rem; color:#27ae60;"></i><br><br>
            <span style="font-size:0.9rem;">Menghubungkan ke Drive...</span>
        </div>`;
    
    try {
        // 2. JALANKAN PROSES TARIK DATA (Karena sudah pasti punya token)
        const response = await fetch(`https://www.googleapis.com/drive/v3/files?q=name contains 'Daily_Log_' and trashed=false&fields=files(id, name)`, {
            headers: { 'Authorization': 'Bearer ' + accessToken }
        });
        
        // Cek jika token tiba-tiba expired di tengah jalan (Unauthorized)
        if (response.status === 401) {
            accessToken = null; // Hapus token busuknya
            tokenClient.requestAccessToken(); // Minta baru
            return;
        }

        const resData = await response.json();
        const files = resData.files;

        if (files && files.length > 0) {
            let gabunganSemuaHari = [];
            for (let file of files) {
                const fileRes = await fetch(`https://www.googleapis.com/drive/v3/files/${file.id}?alt=media`, {
                    headers: { 'Authorization': 'Bearer ' + accessToken }
                });
                const isiFile = await fileRes.json();
                if (Array.isArray(isiFile)) {
                    gabunganSemuaHari = gabunganSemuaHari.concat(isiFile);
                } else {
                    gabunganSemuaHari.push(isiFile);
                }
            }
            gabunganSemuaHari.sort((a, b) => b.id - a.id);
            tampilkanTabelMinimalis(gabunganSemuaHari); 
        } else {
            wadah.innerHTML = "<p style='text-align:center; padding:20px; color:#999;'>Belum ada data di Cloud Drive.</p>";
        }
    } catch (err) {
        console.error(err);
        wadah.innerHTML = "<p style='text-align:center; padding:20px;'>Gagal memuat data. Coba klik Sinkron lagi.</p>";
    }
}

// --- 3. FUNGSI TAMPILAN (YANG TADI ERROR KARENA ILANG) ---
function tampilkanTabelMinimalis(data) {
    let html = "";

    data.forEach((log, index) => {
        let rincianPemasukan = log.pemasukan.map(i => `• ${i.keterangan} (Rp ${i.jumlah.toLocaleString()})`).join('<br>');
        let rincianPengeluaran = log.pengeluaran.map(i => `• ${i.keterangan} (Rp ${i.jumlah.toLocaleString()})`).join('<br>');

        html += `
        <div style="background: white; border-bottom: 1px solid #eee; padding: 12px 0;">
            <div onclick="toggleDetail(${index})" style="display: flex; justify-content: space-between; align-items: center; cursor: pointer;">
                <div>
                    <span style="font-weight: bold; font-size: 14px; color: #333;">${log.tanggal}</span>
                    <i class="fa fa-caret-down" style="font-size: 12px; color: #aaa; margin-left: 5px;"></i>
                </div>
                <div style="text-align: right;">
                    <span style="color: #27ae60; font-size: 13px; font-weight: bold;">+${log.totalIn.toLocaleString()}</span><br>
                    <span style="color: #e74c3c; font-size: 13px; font-weight: bold;">-${log.totalOut.toLocaleString()}</span>
                </div>
            </div>
            
            <div id="detail-${index}" style="display: none; margin-top: 10px; font-size: 12px; background: #fcfcfc; border: 1px solid #f0f0f0; padding: 10px; border-radius: 8px; color: #555;">
                <div style="color: #27ae60; font-weight: bold; margin-bottom: 5px; border-bottom: 1px solid #eee;">Pemasukan:</div>
                <div style="margin-bottom: 10px;">${rincianPemasukan || '<em>Kosong</em>'}</div>
                
                <div style="color: #e74c3c; font-weight: bold; margin-bottom: 5px; border-bottom: 1px solid #eee;">Pengeluaran:</div>
                <div>${rincianPengeluaran || '<em>Kosong</em>'}</div>
            </div>
        </div>`;
    });

    document.getElementById('wadahHistory').innerHTML = html;
}

// --- 4. FUNGSI PENDUKUNG ---
function toggleDetail(id) {
    let el = document.getElementById('detail-' + id);
    el.style.display = (el.style.display === 'none') ? 'block' : 'none';
}

function tampilkanModal(pesan) {
    const modal = document.getElementById('modalNotif');
    const isi = document.getElementById('isiNotif');
    if(modal && isi) {
        modal.style.display = "flex";
        isi.innerHTML = pesan;
    }
}

function tutupModal() {
    document.getElementById('modalNotif').style.display = "none";
}
    </script>
</body>
</html>
