<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
<link href='https://short-url.org/1pNvK.png' rel='icon' type='image/png'/>
<link href='https://short-url.org/1pNvK.png' rel='icon' sizes='192x192'/>
<link href='https://short-url.org/1pNvK.png' rel='apple-touch-icon' sizes='180x180'/>
<link rel="manifest" href="manifest.json"> 
<meta content='https://short-url.org/1pNvK' name='msapplication-TileImage'/>
<meta content='#00a2e9' name='theme-color'/> 
<meta content='#00a2e9' name='theme-color'/>
<meta content='#00a2e9' name='msapplication-navbutton-color'/>
<meta content='yes' name='mobile-web-app-capable'/>
<meta content='#00a2e9' name='apple-mobile-web-app-status-bar-style'/>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/finansial148/editorgue@main/style-pusat.css">
<title>History Harian - Catetan Duit</title>
<style>
        html { background-color: #00a2e9; }
        body { 
            background-color: white; 
            margin: 0 auto; 
            max-width: 500px; 
            min-height: 100vh; 
            box-shadow: 0 0 20px rgba(0,0,0,0.2); 
            padding: 15px;
            font-family: sans-serif;
        }
        .btn-sync {
            background: #27ae60; color: white; border: none; padding: 10px; 
            border-radius: 8px; width: 100%; margin-bottom: 20px; cursor: pointer; font-weight: bold;
        }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f2f2f2; padding: 10px; text-align: left; font-size: 12px; }
        td { padding: 10px; border-bottom: 1px solid #eee; font-size: 13px; }
        .text-masuk { color: #27ae60; font-weight: bold; }
        .text-keluar { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>

    <h2 style="text-align: center; color: #2c3e50;">
        <i class="fas fa-history" style="color: #f39c12;"></i> History Arsip
    </h2>

    <button class="btn-sync" onclick="tokenClient.requestAccessToken()">
        <i class="fa fa-cloud-download-alt"></i> Sinkronisasi dari Drive
    </button>

    <div id="wadahHistory">
        <p style="text-align:center; color:#999;">Klik Sinkronisasi untuk melihat data.</p>
    </div>

    <script src="https://accounts.google.com/gsi/client" onload="initClient()" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>

    <script>
    // --- KONFIGURASI GOOGLE DRIVE (TETAP PAKAI PUNYA ABANG) ---
    const CLIENT_ID = '561366474384-9hf22uio84jrj7adafut9r2h15c2ninf.apps.googleusercontent.com';
    const SCOPES = 'https://www.googleapis.com/auth/drive.file';
    let tokenClient;
    let accessToken = null;

    function initClient() {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID, scope: SCOPES,
            callback: (res) => { accessToken = res.access_token; tarikHistoryDrive(); }
        });
    }

    // --- FUNGSI AMBIL DATA (Sama seperti kemarin) ---
    async function tarikHistoryDrive() {
        const wadah = document.getElementById('wadahHistory');
        wadah.innerHTML = "<p style='text-align:center;'>Sedang mencari history di awan...</p>";
        
        try {
            const response = await fetch(`https://www.googleapis.com/drive/v3/files?q=name contains 'Daily_Log_' and mimeType = 'application/json'&fields=files(id, name)`, {
                headers: { 'Authorization': 'Bearer ' + accessToken }
            });
            const resData = await response.json();
            const files = resData.files;

            if (files && files.length > 0) {
                let gabunganData = [];
                for (let file of files) {
                    const fileRes = await fetch(`https://www.googleapis.com/drive/v3/files/${file.id}?alt=media`, {
                        headers: { 'Authorization': 'Bearer ' + accessToken }
                    });
                    const isi = await fileRes.json();
                    gabunganData.push(isi);
                }
                gabunganData.sort((a, b) => b.id - a.id);
                tampilkanTabelMinimalis(gabunganData); // Pakai fungsi tampilan baru
            } else {
                wadah.innerHTML = "<p style='text-align:center; color:#999;'>Belum ada data di Drive.</p>";
            }
        } catch (err) {
            alert("Gagal koneksi ke Drive.");
        }
    }

    // --- FUNGSI TAMPILAN BARU (LEBIH BERSIH & IRIT TEMPAT) ---
    function tampilkanTabelMinimalis(data) {
        let html = `
        <table>
            <thead>
                <tr>
                    <th>Tanggal</th>
                    <th style="text-align:right">Masuk</th>
                    <th style="text-align:right">Keluar</th>
                </tr>
            </thead>
            <tbody>`;

        data.forEach(log => {
            html += `
            <tr>
                <td><strong>${log.tanggal}</strong></td>
                <td class="text-masuk" style="text-align:right">${log.totalIn.toLocaleString()}</td>
                <td class="text-keluar" style="text-align:right">${log.totalOut.toLocaleString()}</td>
            </tr>`;
        });

        html += `</tbody></table>`;
        document.getElementById('wadahHistory').innerHTML = html;
    }
    </script>
</body>
</html>
