<title>History Harian - Catetan Duit</title>
<style>
        html { background-color: #00a2e9; }
        body { 
            background-color: white; 
            margin: 0 auto; 
            max-width: 500px; 
            min-height: 100vh; 
            box-shadow: 0 0 20px rgba(0,0,0,0.2); 
            padding: 15px;
            font-family: sans-serif;
        }
        .btn-sync {
            background: #27ae60; color: white; border: none; padding: 10px; 
            border-radius: 8px; width: 100%; margin-bottom: 20px; cursor: pointer; font-weight: bold;
        }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f2f2f2; padding: 10px; text-align: left; font-size: 12px; }
        td { padding: 10px; border-bottom: 1px solid #eee; font-size: 13px; }
        .text-masuk { color: #27ae60; font-weight: bold; }
        .text-keluar { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>

    <h2 style="text-align: center; color: #2c3e50;">
        <i class="fas fa-history" style="color: #f39c12;"></i> History Arsip
    </h2>

    <button class="btn-sync" onclick="tokenClient.requestAccessToken()">
        <i class="fa fa-cloud-download-alt"></i> Sinkronisasi dari Drive
    </button>

    <div id="wadahHistory">
        <p style="text-align:center; color:#999;">Klik Sinkronisasi untuk melihat data.</p>
    </div>
<div id="modalNotif" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; align-items: center; justify-content: center;">
    <div style="border: 1px solid #444; width: 85%; max-width: 300px; padding: 25px; background: #000000; border-radius: 15px; text-align: center; color: white;">
        <div id="isiNotif" style="margin-bottom: 20px; font-size: 0.95rem; line-height: 1.5;"></div>
        <button onclick="tutupModal()" style="background: white; color: black; border: none; padding: 10px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%;">Oke Sip!</button>
    </div>
</div>
    <script src="https://accounts.google.com/gsi/client" onload="initClient()" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>

    <script>
// --- KONFIGURASI GOOGLE DRIVE ---
const CLIENT_ID = '561366474384-9hf22uio84jrj7adafut9r2h15c2ninf.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/drive.file';
let tokenClient;
let accessToken = null;

function initClient() {
    tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID, scope: SCOPES,
        callback: (res) => { 
            accessToken = res.access_token; 
            tarikHistoryDrive(); 
        }
    });
}

// --- FUNGSI AMBIL DATA DENGAN LOADING ---
async function tarikHistoryDrive() {
    const wadah = document.getElementById('wadahHistory');
    
    // Tampilan Loading yang lebih keren
    wadah.innerHTML = `
        <div style="text-align:center; padding:40px; color:#7f8c8d;">
            <i class="fa fa-spinner fa-spin" style="font-size:2rem; color:#27ae60;"></i><br><br>
            <span style="font-size:0.9rem;">Menjemput history di awan...</span>
        </div>`;
    
    try {
        const response = await fetch(`https://www.googleapis.com/drive/v3/files?q=name contains 'Daily_Log_' and mimeType = 'application/json'&fields=files(id, name)`, {
            headers: { 'Authorization': 'Bearer ' + accessToken }
        });
        const resData = await response.json();
        const files = resData.files;

        if (files && files.length > 0) {
            let gabunganData = [];
            for (let file of files) {
                const fileRes = await fetch(`https://www.googleapis.com/drive/v3/files/${file.id}?alt=media`, {
                    headers: { 'Authorization': 'Bearer ' + accessToken }
                });
                const isi = await fileRes.json();
                gabunganData.push(isi);
            }
            // Urutkan dari yang terbaru (ID biasanya berupa timestamp)
            gabunganData.sort((a, b) => b.id - a.id);
            tampilkanTabelMinimalis(gabunganData); 
            
            // Bonus Notif Sukses
            tampilkanModal("<b>History Berhasil ditarik!</b><br>Menampilkan " + gabunganData.length + " catatan harian.");
        } else {
            wadah.innerHTML = `
                <div style="text-align:center; padding:40px; color:#999;">
                    <i class="fa fa-cloud-upload-alt" style="font-size:2rem; margin-bottom:10px;"></i><br>
                    Belum ada data history di Drive Abang.
                </div>`;
        }
    } catch (err) {
        console.error(err);
        tampilkanModal("<b>Gagal Koneksi!</b><br>Waduh, gagal ngambil data dari Drive. Cek internet Bang!");
        wadah.innerHTML = "<p style='text-align:center; padding:20px;'>Gagal memuat data.</p>";
    }
}

// --- MESIN MODAL HITAM (Copy-Paste dari Arsip biar seragam) ---
function tampilkanModal(pesan) {
    const modal = document.getElementById('modalNotif');
    const isi = document.getElementById('isiNotif');
    
    modal.style.display = "flex";
    isi.innerHTML = pesan;
}

function tutupModal() {
    document.getElementById('modalNotif').style.display = "none";
}

// Fungsi tampilkanTabelMinimalis & toggleDetail tetap sama seperti yang Abang punya
    </script>
</body>
