<!DOCTYPE html>
<html lang="id">
<head>

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

<title>History Harian - Catetan Duit</title>
    <style>
        /* Desain simpel & bersih ala Catetan Duit */
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; padding: 15px; color: #333; }
        .header { display: flex; align-items: center; margin-bottom: 20px; }
        .header h2 { margin: 0; flex: 1; color: #00a2e9; }
        .btn-sync { background: #27ae60; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; width: 100%; margin-bottom: 15px; font-weight: bold; }
        .card-history { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 5px solid #00a2e9; }
        .tgl-judul { font-size: 0.9rem; color: #7f8c8d; margin-bottom: 10px; display: block; border-bottom: 1px dashed #eee; padding-bottom: 5px; }
        .item-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.85rem; }
        .text-masuk { color: #27ae60; }
        .text-keluar { color: #e74c3c; }
        .rekap-kecil { background: #f9f9f9; padding: 8px; border-radius: 5px; margin-top: 10px; display: flex; justify-content: space-between; font-weight: bold; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="header">
    <button onclick="window.history.back()" style="border:none; background:none; font-size:1.5rem; margin-right:10px; cursor:pointer;">&larr;</button>
    <h2>History Harian</h2>
</div>

<button class="btn-sync" onclick="tokenClient.requestAccessToken()">
    <i class="fa fa-cloud-download"></i> Sinkronisasi Data Harian
</button>

<div id="wadahHistory">
    </div>

<script>
    const CLIENT_ID = '167260298636-pmgiitt3usb68df61re3e9p9s50h53o7.apps.googleusercontent.com';
    const SCOPES = 'https://www.googleapis.com/auth/drive.file';
    let tokenClient;
    let accessToken = null;

    function initClient() {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID, scope: SCOPES,
            callback: (res) => { accessToken = res.access_token; tarikHistoryDrive(); }
        });
    }

    // FUNGSI UTAMA: Ambil file history dari Drive
    async function tarikHistoryDrive() {
        const wadah = document.getElementById('wadahHistory');
        wadah.innerHTML = "<p style='text-align:center;'>Sedang mencari history di awan...</p>";
        
        try {
            // Cari file dengan awalan "Daily_Log_"
            const response = await fetch(`https://www.googleapis.com/drive/v3/files?q=name contains 'Daily_Log_' and mimeType = 'application/json'&fields=files(id, name)`, {
                headers: { 'Authorization': 'Bearer ' + accessToken }
            });
            const resData = await response.json();
            const files = resData.files;

            if (files && files.length > 0) {
                let gabunganData = [];
                for (let file of files) {
                    const fileRes = await fetch(`https://www.googleapis.com/drive/v3/files/${file.id}?alt=media`, {
                        headers: { 'Authorization': 'Bearer ' + accessToken }
                    });
                    const isi = await fileRes.json();
                    gabunganData.push(isi);
                }
                // Urutkan dari tanggal terbaru berdasarkan timestamp id
                gabunganData.sort((a, b) => b.id - a.id);
                tampilkanKeUI(gabunganData);
            } else {
                wadah.innerHTML = "<p style='text-align:center; color:#999;'>Belum ada history harian di Drive.</p>";
            }
        } catch (err) {
            alert("Gagal koneksi ke Drive.");
            console.log(err);
        }
    }

    function tampilkanKeUI(data) {
        let html = "";
        data.forEach(log => {
            let listMasuk = log.pemasukan.map(i => `<div class="item-row"><span>${i.keterangan}</span><span class="text-masuk">+${i.jumlah.toLocaleString()}</span></div>`).join('');
            let listKeluar = log.pengeluaran.map(i => `<div class="item-row"><span>${i.keterangan}</span><span class="text-keluar">-${i.jumlah.toLocaleString()}</span></div>`).join('');
            
            html += `
            <div class="card-history">
                <span class="tgl-judul"><i class="fa fa-calendar"></i> ${log.tanggal}</span>
                ${listMasuk}
                ${listKeluar}
                <div class="rekap-kecil">
                    <span>Sisa Hari Ini:</span>
                    <span style="color:${(log.totalIn - log.totalOut) >= 0 ? '#27ae60' : '#e74c3c'}">
                        Rp ${(log.totalIn - log.totalOut).toLocaleString()}
                    </span>
                </div>
            </div>`;
        });
        document.getElementById('wadahHistory').innerHTML = html;
    }
</script>

<script src="https://accounts.google.com/gsi/client" onload="initClient()" async defer></script>
<script src="https://apis.google.com/js/api.js" async defer></script>
</body>
</html>
