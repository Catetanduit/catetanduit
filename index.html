  <script>
    // --- 1. KONFIGURASI GOOGLE ---
const CLIENT_ID = '561366474384-9hf22uio84jrj7adafut9r2h15c2ninf.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/userinfo.email';
let tokenClient;
let accessToken = null;

// --- 2. FUNGSI INISIALISASI ---
function initClient() {
    tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        callback: async (res) => {
            accessToken = res.access_token;
            await ambilProfilUser(); // Ambil siapa yang login
            updateRingkasanDashboard(); // Update angka-angka
        },
    });
}

// Fungsi Ambil Profil dari Google
async function ambilProfilUser() {
    try {
        const response = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
            headers: { 'Authorization': 'Bearer ' + accessToken }
        });
        const user = await response.json();
        
        // Simpan ke memori HP
        localStorage.setItem('user_aktif', JSON.stringify(user));

        // Tampilkan sapaan dan email
        document.getElementById('tokoku').innerHTML = "Halo, " + user.name;
        // Jika ada element login, kita sembunyikan
        if(document.getElementById('layarLogin')) document.getElementById('layarLogin').style.display = "none";
        if(document.getElementById('menuUtama')) document.getElementById('menuUtama').style.display = "block";
        
    } catch (err) {
        console.error("Gagal ambil profil:", err);
    }
}

// --- 3. FUNGSI WAKTU & INFO (Script Pertama Abang) ---
function formatAMPM() {
    var d = new Date(),
        minutes = d.getMinutes().toString().padStart(2, '0'),
        hours = d.getHours().toString().padStart(2, '0'),
        day = d.getDate(),
        monthNum = d.getMonth(),
        ampm = (d.getHours() >= 5 && d.getHours() < 11) ? ' Pagi' : 
               (d.getHours() >= 11 && d.getHours() < 15) ? ' Siang' : 
               (d.getHours() >= 15 && d.getHours() < 18) ? ' Sore' : ' Malam',
        months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Okt','Nov','Des'],
        days = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];

    return `${days[d.getDay()]}, ${day} ${months[monthNum]} ${d.getFullYear()} | ${hours}:${minutes} ${ampm}
        <rekap id="rekap">
            <p><strong><i class="fa fa-bell"></i> INFORMASI REKAP</strong></p>
            Hari ini Tanggal ${day}-${months[monthNum]}. <br>
            Jangan lupa persiapkan rekap pembukuan bulanan ya Bang!
        </rekap>`;
}

// --- 4. FUNGSI RINGKASAN DASHBOARD (Script Kedua Abang) ---
function updateRingkasanDashboard() {
    let dataMasuk = JSON.parse(localStorage.getItem('database_pemasukan')) || [];
    let dataKeluar = JSON.parse(localStorage.getItem('db_keluar')) || [];

    let totalMasuk = dataMasuk.reduce((acc, item) => acc + parseInt(item.jumlah || 0), 0);
    let totalKeluar = dataKeluar.reduce((acc, item) => acc + parseInt(item.jumlah || 0), 0);
    let labaBersih = totalMasuk - totalKeluar;

    document.getElementById('ringkasanMasuk').innerText = "Rp " + totalMasuk.toLocaleString('id-ID');
    document.getElementById('ringkasanKeluar').innerText = "Rp " + totalKeluar.toLocaleString('id-ID');
    document.getElementById('ringkasanLaba').innerText = "Rp " + labaBersih.toLocaleString('id-ID');

    const boxLaba = document.getElementById('ringkasanLaba');
    boxLaba.style.color = (labaBersih < 0) ? "#d32f2f" : "#1565c0";
}

// --- 5. JALANKAN SEMUA SAAT START ---
window.addEventListener('load', () => {
    // Jalankan Waktu
    document.getElementById("para1").innerHTML = formatAMPM();
    
    // Efek menghilang untuk notifikasi rekap
    setTimeout(() => {
        const rekapEl = document.getElementById('rekap');
        if (rekapEl) {
            rekapEl.style.opacity = '0';
            setTimeout(() => { rekapEl.style.display = 'none'; }, 2000);
        }
    }, 7000);

    // Jalankan mesin Google
    initClient();
    
    // Cek apakah sudah pernah login sebelumnya
    // 3. CEK INGATAN (Apakah user sudah pernah login?)
    const userLama = JSON.parse(localStorage.getItem('user_aktif'));

    if (userLama) {
        // Kalau ada datanya, langsung buka pintu tanpa nanya lagi
        document.getElementById('layarLogin').style.display = "none";
        document.getElementById('menuUtama').style.display = "block";
        
        // Pasang nama dan emailnya
        document.getElementById('sapaanUser').innerText = "Halo, " + userLama.name + "!";
        document.getElementById('emailUser').innerText = userLama.email;
        
        // Update angka-angka dashboard
        updateRingkasanDashboard();
    } else {
        // Kalau belum ada data, tetap di layar login
        document.getElementById('layarLogin').style.display = "block";
        document.getElementById('menuUtama').style.display = "none";
    }
});
    </script>
