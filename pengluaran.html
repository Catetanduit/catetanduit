  <script>
    let dbPengeluaran = JSON.parse(localStorage.getItem('db_keluar')) || [];

// --- SETTING GOOGLE DRIVE (SISTEM BUKU BULANAN) ---
const CLIENT_ID = '561366474384-9hf22uio84jrj7adafut9r2h15c2ninf.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/drive.file';
let tokenClient;
let accessToken = null;

function initClient() {
    tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID, scope: SCOPES,
        callback: (res) => { accessToken = res.access_token; uploadKeDrive(); }
    });
}

function mulaiBackup() {
    if (!accessToken) {
        tokenClient.requestAccessToken();
    } else {
        uploadKeDrive();
    }
}

async function uploadKeDrive() {
    let tgl = new Date();
    let namaBulan = tgl.toLocaleString('id-ID', { month: 'long', year: 'numeric' }).replace(/\s/g, '_');
    let namaFile = 'Daily_Log_' + namaBulan + '.json';

    let dataMasuk = JSON.parse(localStorage.getItem('database_pemasukan')) || [];
    let paketHarian = {
        id: Date.now(),
        tanggal: tgl.toLocaleDateString('id-ID'),
        pemasukan: dataMasuk,
        pengeluaran: JSON.parse(localStorage.getItem('db_keluar')) || [],
        totalIn: dataMasuk.reduce((s, i) => s + i.jumlah, 0),
        totalOut: (JSON.parse(localStorage.getItem('db_keluar')) || []).reduce((s, i) => s + i.jumlah, 0)
    };

    try {
        const cari = await fetch(`https://www.googleapis.com/drive/v3/files?q=name='${namaFile}' and trashed=false`, {
            headers: { 'Authorization': 'Bearer ' + accessToken }
        });
        const hasilCari = await cari.json();

        if (hasilCari.files && hasilCari.files.length > 0) {
            let fileId = hasilCari.files[0].id;
            const download = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
                headers: { 'Authorization': 'Bearer ' + accessToken }
            });
            let isiLama = await download.json();
            if (!Array.isArray(isiLama)) isiLama = [isiLama];

            let idx = isiLama.findIndex(item => item.tanggal === paketHarian.tanggal);
            if (idx !== -1) { isiLama[idx] = paketHarian; } else { isiLama.unshift(paketHarian); }

            await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`, {
                method: 'PATCH',
                headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
                body: JSON.stringify(isiLama)
            });
        } else {
            const metadata = { 'name': namaFile, 'mimeType': 'application/json' };
            const formData = new FormData();
            formData.append('metadata', new Blob([JSON.stringify(metadata)], {type: 'application/json'}));
            formData.append('file', new Blob([JSON.stringify([paketHarian])], {type: 'application/json'}));
            await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + accessToken },
                body: formData
            });
        }
        console.log("Cloud Sinkron: " + namaFile);
    } catch (err) { console.error("Gagal Sinkron:", err); }
}

function tambahPengeluaran() {

    let ket = document.getElementById('ketKeluar').value;

    let nom = parseInt(document.getElementById('nomKeluar').value);

    let isModal = document.getElementById('isModal').checked;

    let tgl = new Date().toLocaleDateString('id-ID');



    if (ket && nom) {

        let dataBaru = {

            key: Date.now(),

            tanggal: tgl,

            keterangan: isModal ? "REKAP MODAL: " + ket : ket,

            jumlah: nom,

            tipe: isModal ? "modal" : "biasa"

        };



        dbPengeluaran.unshift(dataBaru);

        localStorage.setItem('db_keluar', JSON.stringify(dbPengeluaran));

        

        document.getElementById('ketKeluar').value = "";

        document.getElementById('nomKeluar').value = "";

        tampilkanKeluar();

        

        // OTOMATIS BACKUP

        mulaiBackup();

    }

}      
function tampilkanKeluar() {
    let html = "";
    let total = 0;
    dbPengeluaran.forEach(item => {
        total += item.jumlah;
        html += `<li class="card-data"><div><span class="text-tgl">${item.tanggal}</span><br><span class="text-harga">${item.keterangan}</span></div><div style="text-align: right;"><span class="text-harga">Rp ${item.jumlah.toLocaleString()}</span><br><span onclick="hapusKeluar(${item.key})" style="color:red; cursor:pointer;"><i class="fa fa-trash"></i></span></div></li>`;
    });
    document.getElementById('listKeluar').innerHTML = html;
    document.getElementById('totalKeluar').innerText = "Rp " + total.toLocaleString();
}

function hapusKeluar(key) {
    dbPengeluaran = dbPengeluaran.filter(item => item.key !== key);
    localStorage.setItem('db_keluar', JSON.stringify(dbPengeluaran));
    tampilkanKeluar();
    mulaiBackup();
}
function bukaTutupTambah() {
    let x = document.getElementById("tambahin");
    if (x.style.display === "none") {
        x.style.display = "block";
    } else {
        x.style.display = "none";
        // Bersihkan peringatan kalau form ditutup manual
        document.getElementById("peringatan").style.display = "none";
    }
}
function bukaTutupHapus() {
    const kotak = document.getElementById("boxHapus");
    if (kotak.style.display === "none") {
        kotak.style.display = "block"; // Buka     
    } else {
        kotak.style.display = "none"; // Tutup
    }
}
function ngapusmua() {
  yakinhapus.style.display = 'block';
  boxHapus.style.display = 'none';
}
function toggleTombolBaris() {

    document.getElementById("mohatif").innerHTML ='span i.fa.fa-trash{display:block}';
  boxHapus.style.display = 'none';
}
function hapusSemua() {
        localStorage.removeItem('db_keluar');
        tampilkanKeluar();
}    
// Jalankan saat halaman dibuka
window.onload = function() { tampilkanKeluar(); }; 
  </script>
