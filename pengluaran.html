    <h2 class="judul" style="color: #d32f2f;"><i class="fa fa-shopping-cart"></i> Pengeluaran Harian</h2>

    <div class="card-data" style="display: block; border-left: 5px solid #d32f2f;">

        <button onclick="tambahPengeluaran()" class="btn btn-pengeluaran" style="width: 100%; margin-top: 10px; justify-content: center;">

  <script>
    let dbPengeluaran = JSON.parse(localStorage.getItem('db_keluar')) || [];

// --- SETTING GOOGLE DRIVE ---
const CLIENT_ID = '561366474384-9hf22uio84jrj7adafut9r2h15c2ninf.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/drive.file';
let tokenClient;
let accessToken = null;

function initClient() {
    tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID, scope: SCOPES,
        callback: (res) => { accessToken = res.access_token; uploadKeDrive(); }
    });
}

function tambahPengeluaran() {
    let ket = document.getElementById('ketKeluar').value;
    let nom = parseInt(document.getElementById('nomKeluar').value);
    let isModal = document.getElementById('isModal').checked;
    let tgl = new Date().toLocaleDateString('id-ID');

    if (ket && nom) {
        let dataBaru = {
            key: Date.now(),
            tanggal: tgl,
            keterangan: isModal ? "REKAP MODAL: " + ket : ket,
            jumlah: nom,
            tipe: isModal ? "modal" : "biasa"
        };

        dbPengeluaran.unshift(dataBaru);
        localStorage.setItem('db_keluar', JSON.stringify(dbPengeluaran));
        
        document.getElementById('ketKeluar').value = "";
        document.getElementById('nomKeluar').value = "";
        tampilkanKeluar();
        
        // OTOMATIS BACKUP
        mulaiBackup();
    }
}

function mulaiBackup() {
    if (!accessToken) {
        tokenClient.requestAccessToken();
    } else {
        uploadKeDrive();
    }
}

async function uploadKeDrive() {
    let tgl = new Date().toLocaleDateString('id-ID').replace(/\//g, '-');
    let dataPemasukan = JSON.parse(localStorage.getItem('database_pemasukan')) || [];

    let paketHarian = {
        id: Date.now(),
        tanggal: new Date().toLocaleDateString('id-ID'),
        pemasukan: dataPemasukan,
        pengeluaran: dbPengeluaran,
        totalIn: dataPemasukan.reduce((s, i) => s + i.jumlah, 0),
        totalOut: dbPengeluaran.reduce((s, i) => s + i.jumlah, 0)
    };

    const metadata = { 'name': 'Daily_Log_' + tgl + '.json', 'mimeType': 'application/json' };
    const file = new Blob([JSON.stringify(paketHarian)], {type: 'application/json'});
    const formData = new FormData();
    formData.append('metadata', new Blob([JSON.stringify(metadata)], {type: 'application/json'}));
    formData.append('file', file);

    fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
        method: 'POST',
        headers: new Headers({'Authorization': 'Bearer ' + accessToken}),
        body: formData
    }).then(() => console.log("Backup Pengeluaran Berhasil!"));
}

function tampilkanKeluar() {
    let html = "";
    let total = 0;
    dbPengeluaran.forEach(item => {
        total += item.jumlah;
        html += `<li class="card-data"><div><span class="text-tgl">${item.tanggal}</span><br><span class="text-harga">${item.keterangan}</span></div><div style="text-align: right;"><span class="text-harga">Rp ${item.jumlah.toLocaleString()}</span><br><span onclick="hapusKeluar(${item.key})" style="color:red; cursor:pointer;"><i class="fa fa-trash"></i></span></div></li>`;
    });
    document.getElementById('listKeluar').innerHTML = html;
    document.getElementById('totalKeluar').innerText = "Rp " + total.toLocaleString();
}

function hapusKeluar(key) {
    dbPengeluaran = dbPengeluaran.filter(item => item.key !== key);
    localStorage.setItem('db_keluar', JSON.stringify(dbPengeluaran));
    tampilkanKeluar();
    mulaiBackup();
}

window.onload = function() { tampilkanKeluar(); }; 
  </script>
