<script>
let dataPemasukan = JSON.parse(localStorage.getItem('database_pemasukan')) || [];

// --- SETTING GOOGLE DRIVE ---
const CLIENT_ID = '561366474384-9hf22uio84jrj7adafut9r2h15c2ninf.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/drive.file';
let tokenClient;
let accessToken = null;

function initClient() {
    tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID, scope: SCOPES,
        callback: (tokenResponse) => { accessToken = tokenResponse.access_token; uploadKeDrive(); }
    });
}

// Fungsi Simpan (Modifikasi: Tambah Trigger Backup)
function simpanData(ket, nominal) {
    let tgl = new Date().toLocaleDateString('id-ID'); 
    let angkaBersih = nominal.toString().replace(/\./g, "");
    
    dataPemasukan.unshift({
        tanggal: tgl,
        keterangan: ket,
        jumlah: parseInt(angkaBersih)
    });

    localStorage.setItem('database_pemasukan', JSON.stringify(dataPemasukan));
    tampilkanData();
    
    // OTOMATIS BACKUP KE DRIVE
    mulaiBackup();
}

function mulaiBackup() {
    if (!accessToken) {
        tokenClient.requestAccessToken(); // Minta izin dulu kalau belum login
    } else {
        uploadKeDrive();
    }
}

async function uploadKeDrive() {
    let tgl = new Date().toLocaleDateString('id-ID').replace(/\//g, '-');
    let dataKeluar = JSON.parse(localStorage.getItem('db_keluar')) || []; // Ambil juga data pengeluaran biar sinkron

    let paketHarian = {
        id: Date.now(),
        tanggal: new Date().toLocaleDateString('id-ID'),
        pemasukan: dataPemasukan,
        pengeluaran: dataKeluar,
        totalIn: dataPemasukan.reduce((s, i) => s + i.jumlah, 0),
        totalOut: dataKeluar.reduce((s, i) => s + i.jumlah, 0)
    };

    const metadata = {
        'name': 'Daily_Log_' + tgl + '.json',
        'mimeType': 'application/json'
    };

    const file = new Blob([JSON.stringify(paketHarian)], {type: 'application/json'});
    const formData = new FormData();
    formData.append('metadata', new Blob([JSON.stringify(metadata)], {type: 'application/json'}));
    formData.append('file', file);

    fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
        method: 'POST',
        headers: new Headers({'Authorization': 'Bearer ' + accessToken}),
        body: formData
    }).then(() => {
        console.log("Backup Pemasukan Berhasil!");
    });
}

// Fungsi input manual & tampilkan (Tetap seperti aslinya)
function inputManual() {
    let ket = document.getElementById('mNama').value;
    let nom = document.getElementById('mTotal').value;
    if(ket && nom) {
        simpanData(ket, nom);
        document.getElementById('mNama').value = "";
        document.getElementById('mTotal').value = "";
    }
}

function tampilkanData() {
    let html = "";
    let totalSeluruhnya = 0;
    dataPemasukan.forEach((item, index) => {
        html += `<div class="kotak-msk"><div class="hal-msk"><span>${item.tanggal}</span><span>${item.keterangan}</span></div><div class="nomin-msk"><span>Rp ${item.jumlah.toLocaleString()}</span><button onclick="hapusBaris(${index})">X</button></div></div>`;
        totalSeluruhnya += item.jumlah;
    });
    document.getElementById('bodyTabel').innerHTML = html;
    document.getElementById('totalSemua').innerText = "Total: Rp " + totalSeluruhnya.toLocaleString();
}

function hapusBaris(index) {
    if (confirm("Hapus catatan ini?")) {
        dataPemasukan.splice(index, 1);
        localStorage.setItem('database_pemasukan', JSON.stringify(dataPemasukan));
        tampilkanData();
        mulaiBackup(); // Update Drive juga
    }
}

window.onload = function() { tampilkanData(); };
</script>
