<script>
let dataPemasukan = JSON.parse(localStorage.getItem('database_pemasukan')) || [];

window.onload = function() {

    // 1. CEK APAKAH ADA KIRIMAN DARI NOTA LEWAT URL

    const params = new URLSearchParams(window.location.search);

    const namaNota = params.get('nama');

    const totalNota = params.get('total');



    if (namaNota && totalNota) {

        simpanData(namaNota, totalNota);

        // Hilangkan parameter di URL biar kalau direfresh nggak masuk dua kali

        window.history.replaceState({}, document.title, window.location.pathname);

    }



    tampilkanData();

};

// --- SETTING GOOGLE DRIVE (SISTEM BUKU BULANAN) ---
const CLIENT_ID = '561366474384-9hf22uio84jrj7adafut9r2h15c2ninf.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/drive.file';
let tokenClient;
let accessToken = null;

function initClient() {
    tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID, scope: SCOPES,
        callback: (tokenResponse) => { 
            accessToken = tokenResponse.access_token; 
            uploadKeDrive(); 
        }
    });
}

function mulaiBackup() {
    if (!accessToken) {
        tokenClient.requestAccessToken();
    } else {
        uploadKeDrive();
    }
}

async function uploadKeDrive() {
    let tgl = new Date();
    // Nama file per bulan: Daily_Log_Maret_2026.json
    let namaBulan = tgl.toLocaleString('id-ID', { month: 'long', year: 'numeric' }).replace(/\s/g, '_');
    let namaFile = 'Daily_Log_' + namaBulan + '.json';

    let dataKeluar = JSON.parse(localStorage.getItem('db_keluar')) || [];
    let paketHarian = {
        id: Date.now(),
        tanggal: tgl.toLocaleDateString('id-ID'),
        pemasukan: JSON.parse(localStorage.getItem('database_pemasukan')) || [],
        pengeluaran: dataKeluar,
        totalIn: (JSON.parse(localStorage.getItem('database_pemasukan')) || []).reduce((s, i) => s + i.jumlah, 0),
        totalOut: dataKeluar.reduce((s, i) => s + i.jumlah, 0)
    };

    try {
        const cari = await fetch(`https://www.googleapis.com/drive/v3/files?q=name='${namaFile}' and trashed=false`, {
            headers: { 'Authorization': 'Bearer ' + accessToken }
        });
        const hasilCari = await cari.json();

        if (hasilCari.files && hasilCari.files.length > 0) {
            let fileId = hasilCari.files[0].id;
            const download = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
                headers: { 'Authorization': 'Bearer ' + accessToken }
            });
            let isiLama = await download.json();
            if (!Array.isArray(isiLama)) isiLama = [isiLama];

            // Update atau Tambah Tanggal
            let idx = isiLama.findIndex(item => item.tanggal === paketHarian.tanggal);
            if (idx !== -1) { isiLama[idx] = paketHarian; } else { isiLama.unshift(paketHarian); }

            await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`, {
                method: 'PATCH',
                headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
                body: JSON.stringify(isiLama)
            });
        } else {
            const metadata = { 'name': namaFile, 'mimeType': 'application/json' };
            const formData = new FormData();
            formData.append('metadata', new Blob([JSON.stringify(metadata)], {type: 'application/json'}));
            formData.append('file', new Blob([JSON.stringify([paketHarian])], {type: 'application/json'}));
            await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + accessToken },
                body: formData
            });
        }
        console.log("Cloud Sinkron: " + namaFile);
    } catch (err) { console.error("Gagal Sinkron:", err); }
}
// --- FUNGSI SIMPAN DATA KE LOCALSTORAGE (YANG TADI ILANG) ---
function simpanData(ket, nominal) {
    let tgl = new Date().toLocaleDateString('id-ID'); 
    let angkaBersih = nominal.toString().replace(/\./g, "");
    
    // Masukkan ke array dataPemasukan
    dataPemasukan.unshift({
        tanggal: tgl,
        keterangan: ket,
        jumlah: parseInt(angkaBersih)
    });

    // Simpan ke HP (LocalStorage)
    localStorage.setItem('database_pemasukan', JSON.stringify(dataPemasukan));
    
    // Update tampilan tabel di layar
    tampilkanData();
    
    // LANGSUNG TERBANG KE DRIVE (BACKUP)
    mulaiBackup();
}
    
// 1. Fungsi Buka-Tutup Manual (Klik Tombol Plus)
function bukaTutupTambah() {
    let x = document.getElementById("tambahin");
    if (x.style.display === "none") {
        x.style.display = "block";
        document.getElementById('mNama').focus(); // Otomatis kursor di input nama
    } else {
        x.style.display = "none";
        // Bersihkan peringatan kalau form ditutup manual
        document.getElementById("peringatan").style.display = "none";
    }
}

// 2. Fungsi Kirim Data
function inputManual() {
    const inputNama = document.getElementById('mNama');
    const inputTotal = document.getElementById('mTotal');
    const pesanPeringatan = document.getElementById("peringatan");
    const demo = document.getElementById("demo");
    const boxForm = document.getElementById("tambahin");

    let ket = inputNama.value.trim();
    let nom = inputTotal.value.trim();

    // Validasi: Cek apakah kosong
    if (ket === "" || nom === "" || nom === "0") {
        pesanPeringatan.style.display = "block";
        pesanPeringatan.innerHTML = " kolom tidak boleh kosong!";
        
        // Form tetap terbuka (display: block)
        boxForm.style.display = "block"; 
        
    } else {
        // Jika data benar:
        pesanPeringatan.style.display = "none";
        
        // Simpan Data
        simpanData(ket, nom);

        // Beri efek sukses
        demo.innerHTML = " Data berhasil dikirim!";
        
        // Kosongkan input
        inputNama.value = "";
        inputTotal.value = "";

        // Tutup Form Otomatis karena data sudah masuk
        setTimeout(() => { 
            boxForm.style.display = "none"; 
            demo.innerHTML = ""; 
        }, 1000); // Tutup setelah 1 detik biar user sempat lihat tulisan sukses
    }
}

function tampilkanData() {
    let html = "";
    let totalSeluruhnya = 0;
    dataPemasukan.forEach((item, index) => {
        html += `<div class="kotak-msk"><div class="hal-msk"><span>${item.tanggal}</span><span>${item.keterangan}</span></div><div class="nomin-msk"><span>Rp ${item.jumlah.toLocaleString()}</span><button onclick="hapusBaris(${index})"><i class="fa fa-trash"></i></button></div></div>`;
        totalSeluruhnya += item.jumlah;
    });
    document.getElementById('bodyTabel').innerHTML = html;
    document.getElementById('totalSemua').innerText = "Total: Rp " + totalSeluruhnya.toLocaleString();
}

function hapusBaris(index) {
        dataPemasukan.splice(index, 1);
        localStorage.setItem('database_pemasukan', JSON.stringify(dataPemasukan));
        tampilkanData();
        mulaiBackup(); // Update Drive juga
}

function hapusSemua() {
    if(confirm("Yakin mau hapus semua laporan bulan ini?")) {
        localStorage.removeItem('database_pemasukan');
        dataPemasukan = [];
        tampilkanData();
    }
}

function bukaTutupHapus() {
    const kotak = document.getElementById("boxHapus");
    if (kotak.style.display === "none") {
        kotak.style.display = "block"; // Buka     
    } else {
        kotak.style.display = "none"; // Tutup
    }
}

function toggleTombolBaris() {

    document.getElementById("mohatif").innerHTML ='.nomin-msk button{display:block}';
  boxHapus.style.display = 'none';
}
function ngapusmua() {
  yakinhapus.style.display = 'block';
  boxHapus.style.display = 'none';
}

function kirimKeBulanan() {

    // Ambil nilai dari h3 (kita bersihkan teks 'Total: Rp' dan titik-titiknya)

    let totalTeks = document.getElementById('totalSemua').innerText;

    let angkaSaja = totalTeks.replace(/[^0-9]/g, ''); 

    

    // Ambil bulan & tahun saat ini untuk label

    let d = new Date();

    let namaBulan = d.toLocaleDateString('id-ID', { month: 'long', year: 'numeric' });

    let tglLengkap = d.getDate() + "/" + namaBulan;



    // Kirim ke halaman bulanan via URL

    window.location.href = "https://catetanduit.github.io/catetanduit/pemasukan-bulanan.html?bulan=" + encodeURIComponent(tglLengkap) + "&total=" + angkaSaja;

}
    
window.onload = function() { tampilkanData(); };
</script>
