    <div id="modalNotif" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; align-items: center; justify-content: center;">

        <div id="isiNotif" style="margin-bottom: 20px; font-size: 0.95rem; line-height: 1.5;"></div>
        <div id="tombolNotif" style="display: flex; gap: 10px;"></div>

    <script>
// 1. KONFIGURASI GOOGLE
const CLIENT_ID = '561366474384-9hf22uio84jrj7adafut9r2h15c2ninf.apps.googleusercontent.com'; 
const SCOPES = 'https://www.googleapis.com/auth/drive.file';

let tokenClient;
let accessToken = null;
let idHapusSementara = null; // Buat nampung ID pas mau hapus

// 2. INISIALISASI
function initClient() {
    tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        callback: (tokenResponse) => {
            accessToken = tokenResponse.access_token;
            // Simpan ke kantung cadangan biar halaman lain bisa pakai
            sessionStorage.setItem('temp_token', accessToken); 
            tarikDataDariDrive();
        },
    });

    // --- FITUR AUTO-TARIK ---
    // Cek apakah sudah ada token dari login sebelumnya
    accessToken = sessionStorage.getItem('temp_token');
    if (accessToken) {
        console.log("Token ditemukan, langsung tarik data...");
        tarikDataDariDrive();
    }
}

// 3. TARIK DATA DARI GOOGLE DRIVE
async function tarikDataDariDrive() {
    const wadah = document.getElementById('daftarArsip');
    if (wadah) {
        wadah.innerHTML = `<div style="text-align:center; padding:20px;">
            <i class="fa fa-spinner fa-spin"></i> Menghubungkan ke Cloud...
        </div>`;
    }

    // Pastikan token ada sebelum fetch
    if (!accessToken) accessToken = sessionStorage.getItem('temp_token');
    if (!accessToken) {
        if (wadah) wadah.innerHTML = `<button class="btn-login" onclick="tokenClient.requestAccessToken()">Klik untuk Hubungkan ke Cloud</button>`;
        return;
    }

    try {
        // Cari semua file yang namanya mengandung 'Laporan_Lengkap_'
        const response = await fetch(`https://www.googleapis.com/drive/v3/files?q=name contains 'Laporan_Lengkap_' and trashed = false&fields=files(id, name)`, {
            headers: { 'Authorization': 'Bearer ' + accessToken }
        });
        const resData = await response.json();
        const files = resData.files;

        if (files && files.length > 0) {
            let dataCloud = [];
            
            // Proses download isi file satu per satu
            for (let file of files) {
                const fileRes = await fetch(`https://www.googleapis.com/drive/v3/files/${file.id}?alt=media`, {
                    headers: { 'Authorization': 'Bearer ' + accessToken }
                });
                const isi = await fileRes.json();
                
                // Pastikan formatnya seragam
                dataCloud.push(isi);
            }

            // Urutkan berdasarkan ID (biasanya Date.now) agar yang terbaru di atas
            dataCloud.sort((a, b) => b.id - a.id);

            // Simpan ke LocalStorage agar halaman Arsip bisa menampilkannya
            localStorage.setItem('db_laporan_laba', JSON.stringify(dataCloud));
            
            tampilkanArsip(); 
            console.log("Berhasil menarik " + dataCloud.length + " data.");
        } else {
            console.log("Drive kosong, tidak ada file laporan.");
            tampilkanArsip();
        }
    } catch (err) {
        console.error("Gagal tarik cloud:", err);
        tampilkanArsip();
    }
}
function cekKoneksiDanTarik() {
    // 1. Cek apakah sudah ada token di memori atau sessionStorage
    if (!accessToken) {
        accessToken = sessionStorage.getItem('temp_token');
    }

    if (accessToken) {
        // 2. Kalau kunci ada, LANGSUNG TARIK (Gak perlu pop-up lagi)
        console.log("Kunci ada, langsung tarik data...");
        tarikDataDariDrive();
    } else {
        // 3. Kalau benar-benar kosong, baru suruh Google buka jendela login
        console.log("Kunci kosong, minta izin Google...");
        tokenClient.requestAccessToken();
    }
}
// 4. TAMPILAN DATA
function tampilkanArsip() {
    const wadah = document.getElementById('daftarArsip');
    const dataArsip = JSON.parse(localStorage.getItem('db_laporan_laba')) || [];

    if (dataArsip.length === 0) {
        wadah.innerHTML = `
            <div style="text-align: center; padding: 50px 20px; color: #95a5a6;">
                <i class="fa fa-folder-open" style="font-size: 3rem; margin-bottom: 10px;"></i>
                <p>Belum ada laporan, Bang! <br>Coba klik tombol <b>Sinkronisasi Cloud</b>.</p>
            </div>`;
        return;
    }

    dataArsip.sort((a, b) => b.id - a.id);

    let html = "";
    dataArsip.forEach(item => {
        html += `
        <div class="card-data" style="display: block; border-left: 5px solid #27ae60; margin-bottom: 15px; background: #fff; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
            <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px;">
                <div>
                    <span style="font-weight: bold; font-size: 1.1rem; color: #2c3e50;">${item.bulan}</span><br>
                    <small style="color: #bdc3c7;">${item.tanggalSimpan || ''}</small>
                </div>
                <span onclick="tanyaHapusSatu(${item.id})" style="color: #e74c3c; cursor: pointer; padding: 5px;"><i class="fa fa-trash"></i></span>
            </div>
            
            <div style="display: flex; gap: 10px; margin-bottom: 10px; font-size: 0.8rem;">
                <div style="flex:1; background:#e8f8f5; padding:5px; border-radius:5px;">Masuk: <br><strong>Rp ${item.totalPemasukan?.toLocaleString() || 0}</strong></div>
                <div style="flex:1; background:#fef9e7; padding:5px; border-radius:5px;">Keluar: <br><strong>Rp ${item.totalPengeluaran?.toLocaleString() || 0}</strong></div>
            </div>

            <div style="background: #fdf2e9; padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #fab1a0;">
                <small style="color: #d35400;">LABA BERSIH</small><br>
                <strong style="font-size: 1.2rem; color: #27ae60;">Rp ${item.totalLaba.toLocaleString()}</strong>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; font-size: 0.75rem; color: #7f8c8d; border-top: 1px solid #eee; padding-top: 10px;">
                <div>Pemodal:<br><strong style="color: #333;">Rp ${item.bagianPemodal.toLocaleString()}</strong></div>
                <div>Pengelola:<br><strong style="color: #333;">Rp ${item.bagianPengelola.toLocaleString()}</strong></div>
                <div>Usaha:<br><strong style="color: #333;">Rp ${item.bagianUsaha.toLocaleString()}</strong></div>
            </div>
        </div>`;
    });
    wadah.innerHTML = html;
}

// 5. LOGIKA HAPUS DENGAN MODAL
function tanyaHapusSatu(id) {
    idHapusSementara = id;
    tampilkanModal("Hapus laporan ini dari HP?<br><small>Data di Drive tetap aman.</small>", "KONFIRMASI");
}

function eksekusiHapusSatu() {
    let dataArsip = JSON.parse(localStorage.getItem('db_laporan_laba')) || [];
    dataArsip = dataArsip.filter(item => item.id !== idHapusSementara);
    localStorage.setItem('db_laporan_laba', JSON.stringify(dataArsip));
    tampilkanArsip();
    tutupModal();
    idHapusSementara = null;
}

// 6. MESIN MODAL HITAM
function tampilkanModal(pesan, tipe = "INFO") {
    const modal = document.getElementById('modalNotif');
    const isi = document.getElementById('isiNotif');
    const tombolBox = document.getElementById('tombolNotif');
    
    modal.style.display = "flex";
    isi.innerHTML = pesan;

    if (tipe === "KONFIRMASI") {
        tombolBox.innerHTML = `
            <button onclick="eksekusiHapusSatu()" style="background: #e74c3c; color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; flex: 1;">Ya, Hapus</button>
            <button onclick="tutupModal()" style="background: #444; color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; flex: 1;">Batal</button>
        `;
    } else {
        tombolBox.innerHTML = `
            <button onclick="tutupModal()" style="background: white; color: black; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%;">Oke Sip!</button>
        `;
    }
}

function tutupModal() {
    document.getElementById('modalNotif').style.display = "none";
}

// Jalankan tampilan awal
tampilkanArsip();
</script>    
<script src="https://accounts.google.com/gsi/client" onload="initClient()" async defer></script>
